<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Camino Hacia el Deporte</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* IMAGEN DE FONDO */
            background-image: url("img/fondo.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Fondo oscuro transparente */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        /* Caja login */
        .login-box {
            position: relative;
            width: 350px;
            padding: 35px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.4);
            text-align: center;
            z-index: 1;
        }

        /* Logo */
        .logo {
            width: 100px;
            margin-bottom: 15px;
        }

        h1 {
            color: #0077cc;
            margin-bottom: 5px;
            font-size: 28px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input:focus {
            border-color: #3399ff;
            outline: none;
            box-shadow: 0 0 5px #3399ff;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #3399ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0077cc;
            transform: scale(1.03);
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>

<body>

    <!-- Fondo oscuro -->
    <div class="overlay"></div>

    <!-- Caja principal -->
    <div class="login-box">

        <!-- LOGO -->
        <img src="img/logocamino.jpeg" class="logo" alt="Logo">

        <h1>Camino Hacia el Deporte</h1>

        <p>Bienvenido</p>

        <form action="indexc.html">

            <input type="text" placeholder="Nombre de usuario" required>

            <input type="password" placeholder="Contraseña" required>

            <button type="submit">Entrar</button>

        </form>

        <div class="footer">
            Tu mejor tienda deportiva
        </div>

    </div>

</body>

</html>
